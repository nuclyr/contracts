syntax = "proto3";

package nuclyr.v1;

import "google/protobuf/timestamp.proto";
import "nuclyr/v1/common.proto";
import "nuclyr/v1/storage.proto";

// Queue service - unified interface across SQS, Pub/Sub, Azure Service Bus
service QueueService {
  rpc Publish(PublishRequest) returns (PublishResponse);
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
  rpc Ack(AckRequest) returns (AckResponse);
}

message PublishRequest {
  string topic = 1;
  bytes payload = 2;
  map<string, string> attributes = 3;
  QueueOptions options = 4;
}

message PublishResponse {
  string message_id = 1;
  Provider provider = 2;
  RoutingDecisionSummary routing = 3;
}

message SubscribeRequest {
  string topic = 1;
  string subscription_name = 2;
  int32 max_messages = 3;   // max messages per batch (default 10)
}

message SubscribeResponse {
  QueueMessage message = 1;
}

message QueueMessage {
  string message_id = 1;
  bytes payload = 2;
  map<string, string> attributes = 3;
  google.protobuf.Timestamp published_at = 4;
  int32 delivery_attempt = 5;
}

message AckRequest {
  string message_id = 1;
  string subscription_name = 2;
}

message AckResponse {
  bool acknowledged = 1;
}

message QueueOptions {
  int32 delay_seconds = 1;
  DataResidency residency = 2;
  RoutingStrategy strategy = 3;
}
